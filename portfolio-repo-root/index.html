<style>

  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {

    color: #000;

  .skip-link:focus { top: 1rem; }

  .display-type {
    font-family: 'Fraunces', Georgia, serif;
    font-optical-sizing: auto;
    letter-spacing: -0.01em;
  }

  .studio-type {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: -0.035em;
  }

  .scene { position: relative; isolation: isolate; }
  .scene::before {
    content: "";
    position: absolute; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(circle at 20% 10%, rgba(124, 92, 255, 0.12), transparent 34%),
      radial-gradient(circle at 80% 20%, rgba(91, 140, 255, 0.1), transparent 32%),
      linear-gradient(180deg, rgba(255,255,255,0.03), transparent 28%, rgba(255,255,255,0.02));
  }

  .ambient-mesh {
    background:
      radial-gradient(circle at var(--cursor-x) var(--cursor-y), rgba(192,132,252,0.18), transparent 22rem),
      radial-gradient(circle at 20% 20%, rgba(124,92,255,0.2), transparent 28rem),
      radial-gradient(circle at 72% 36%, rgba(91,140,255,0.16), transparent 30rem),
      radial-gradient(circle at 45% 88%, rgba(168,85,247,0.12), transparent 24rem);
    /* Was: filter: hue-rotate(...) — filter animation forces a repaint of the whole
       blurred layer every frame. Opacity + transform are compositor-only, same visual
       drift, far cheaper. */
    animation: ambientShift 18s ease-in-out infinite alternate;
    will-change: transform, opacity;

  .ambient-mesh.is-paused { animation-play-state: paused; }
  @media (max-width: 640px) {
    .ambient-mesh { animation: none; }

    left: var(--cursor-x); top: var(--cursor-y);
    width: var(--cursor-size); height: var(--cursor-size);
    transform: translate(-50%, -50%);
    transition: width 220ms ease, height 220ms ease, opacity 220ms ease;

  .intro-screen { animation: introExit 3.2s ease forwards; }
  .intro-line { transform-origin: left; animation: introLine 2.1s cubic-bezier(.16,1,.3,1) forwards; }

  /* Scroll-triggered reveal (replaces load-once animation) */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    filter: blur(10px);
    transition: opacity 900ms cubic-bezier(.16,1,.3,1), transform 900ms cubic-bezier(.16,1,.3,1), filter 900ms cubic-bezier(.16,1,.3,1);
  }
  .reveal.is-visible { opacity: 1; transform: translateY(0); filter: blur(0); }
  .reveal-delay-1.is-visible { transition-delay: 90ms; }
  .reveal-delay-2.is-visible { transition-delay: 180ms; }
  .reveal-delay-3.is-visible { transition-delay: 270ms; }

  /* Quiet default — used on nav links, gallery tiles, secondary cards. No transform claim it doesn't keep. */
  .magnetic { transition: color 250ms ease, border-color 250ms ease, background 250ms ease; }

  /* Real magnetism — was previously just a CSS hover lift with a misleading class name.
     Now driven by actual pointer offset in JS (see MagneticButton). Reserved for the
     handful of true primary actions, per the audit's "reserve emphasis" finding. */
  .magnetic-primary {
    transition: transform 220ms var(--ease-house), box-shadow 300ms ease;
    will-change: transform;
  }
  .magnetic-primary:focus-visible { transform: translateY(-2px); }
  .magnetic-primary:hover { box-shadow: 0 24px 80px rgba(124,92,255,0.28); }

  .cinematic-card { box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 24px 90px rgba(0,0,0,0.28); }

  /* House easing curve — one value, used everywhere motion responds to the user,
     so nothing feels like a different hand designed it. */
  :root { --ease-house: cubic-bezier(.16,1,.3,1); }

  .project-card .project-visual { transition: transform 600ms var(--ease-house), filter 600ms ease; }

  .gallery-tile:hover,
  .gallery-tile:focus-visible { transform: translateY(-6px) scale(1.012); border-color: rgba(192,132,252,0.45); }

  @media (pointer: coarse) {

/* ---------- Real magnetic button (audit #9: 'magnetic' class did nothing magnetic) ----------
   Tracks pointer position relative to the element's center and nudges it up to 10px toward
   the cursor within a 60px radius, springing back on leave. Reserved for true primary actions
   only — nav links and gallery tiles keep the quiet .magnetic (color/border only), per the
   senior-review note that emphasis loses meaning when it's everywhere. */
function MagneticButton({ as: Tag = 'button', className = '', children, ...rest }) {
  const ref = useRef(null);

  const onMove = (e) => {
    const el = ref.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const relX = e.clientX - (rect.left + rect.width / 2);
    const relY = e.clientY - (rect.top + rect.height / 2);
    const pull = 0.25;
    el.style.transform = `translate(${relX * pull}px, ${relY * pull}px)`;
  };

  const onLeave = () => {
    const el = ref.current;
    if (el) el.style.transform = 'translate(0, 0)';
  };

  return (
    <Tag
      ref={ref}
      onMouseMove={onMove}
      onMouseLeave={onLeave}
      className={`magnetic-primary inline-flex items-center justify-center ${className}`}
      {...rest}
    >
      {children}
    </Tag>
  );
}

/* ---------- Reveal-on-scroll hook (fixes: animations only firing on load) ---------- */

function Reveal({ as: Tag = 'div', className = '', delay = 0, children, ...rest }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            setVisible(true);
            io.unobserve(el);
          }
        });
      },
      { threshold: 0.15, rootMargin: '0px 0px -8% 0px' }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);

  const delayClass = delay === 1 ? 'reveal-delay-1' : delay === 2 ? 'reveal-delay-2' : delay === 3 ? 'reveal-delay-3' : '';

  return (
    <Tag ref={ref} className={`reveal ${delayClass} ${visible ? 'is-visible' : ''} ${className}`} {...rest}>
      {children}
    </Tag>
  );
}

/* ---------- Command palette (new — was entirely absent) ---------- */

function CommandPalette({ open, onClose }) {
  const [query, setQuery] = useState('');
  const [activeIndex, setActiveIndex] = useState(0);
  const inputRef = useRef(null);
  const listRef = useRef(null);

  useEffect(() => {
    if (open) {
      setQuery('');
      setActiveIndex(0);
      setTimeout(() => inputRef.current?.focus(), 10);
    }
  }, [open]);

  const results = paletteCommands.filter(c => c.label.toLowerCase().includes(query.toLowerCase()));

  const go = useCallback((target) => {
    onClose();
    document.getElementById(target)?.scrollIntoView({ behavior: 'smooth' });
  }, [onClose]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') { onClose(); return; }
      if (!results.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setActiveIndex((i) => (i + 1) % results.length);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setActiveIndex((i) => (i - 1 + results.length) % results.length);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const target = results[activeIndex]?.target;
        if (target) go(target);
      }
    };
    if (open) window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose, results, activeIndex, go]);

  // Keep the active row in view when arrowing past the visible scroll area.
  useEffect(() => {
    const el = listRef.current?.children?.[activeIndex];
    el?.scrollIntoView({ block: 'nearest' });
  }, [activeIndex]);

  if (!open) return null;

  return (
    <div className="fixed inset-0 z-[95] flex items-start justify-center pt-[14vh] px-4" role="dialog" aria-modal="true" aria-label="Command palette">
      <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={onClose} />

          value={query}
          onChange={(e) => { setQuery(e.target.value); setActiveIndex(0); }}

          role="combobox"
          aria-expanded="true"
          aria-activedescendant={results[activeIndex] ? `cmd-${results[activeIndex].target}` : undefined}

        <div ref={listRef} className="max-h-72 overflow-y-auto py-2" role="listbox">

              id={`cmd-${r.target}`}
              role="option"

              onMouseEnter={() => setActiveIndex(i)}
              onClick={() => go(r.target)}
              className={`w-full text-left px-6 py-3 transition-colors flex items-center justify-between ${i === activeIndex ? 'bg-white/[0.08] text-white' : 'text-zinc-300'}`}
            >
              <span>{r.label}</span>
              <span className="text-xs text-zinc-400">↵</span>
            </button>
          ))}
        </div>
        <div className="px-6 py-3 border-t border-white/10 text-[10px] uppercase tracking-[0.2em] text-zinc-500 flex justify-between">
          <span>↑↓ to navigate · ↵ to select</span>
          <span>Esc to close</span>

      setProgress(isFinite(scrolled) ? scrolled : 0);
      ticking = false;

      if (!ticking) {

/* Gallery as its own component so the lightbox state doesn't clutter the root */
function GallerySection() {
  const [activeIndex, setActiveIndex] = useState(null);
  const lastTriggerRef = useRef(null);
  const active = activeIndex === null ? null : archiveItems[activeIndex];

  const openAt = (index, triggerEl) => {
    lastTriggerRef.current = triggerEl;
    setActiveIndex(index);
  };
  const closeLightbox = () => {
    setActiveIndex(null);
    lastTriggerRef.current?.focus();
  };

  useEffect(() => {
    const onKey = (e) => {
      if (activeIndex === null) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') setActiveIndex((i) => (i + 1) % archiveItems.length);
      if (e.key === 'ArrowLeft') setActiveIndex((i) => (i - 1 + archiveItems.length) % archiveItems.length);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [activeIndex]);

  return (
    <section id="gallery" className="scene py-20 md:py-24 px-6 bg-white/[0.015] border-y border-white/5">
      <div className="max-w-7xl mx-auto">
        <Reveal className="grid lg:grid-cols-[0.9fr_1.1fr] gap-10 items-end mb-12">
          <div>
            <p className="uppercase tracking-[0.35em] text-xs text-zinc-400 mb-4">Visual Archive</p>
            <h2 className="display-type text-5xl md:text-7xl font-black max-w-4xl leading-[0.92]">
              A living archive of taste.
            </h2>
          </div>
          <p className="text-zinc-400 text-lg leading-relaxed max-w-2xl">
            Posters, UI screens, pitch decks, campaigns, and creative experiments balanced between emotion, structure, aesthetics, and strategy. Click any piece to expand.
          </p>
        </Reveal>

        <div className="columns-1 sm:columns-2 lg:columns-3 gap-5 space-y-5">
          {archiveItems.map((item, index) => (
            <Reveal
              key={item.title}
              delay={(index % 3) + 1}
              as="button"
              onClick={(e) => openAt(index, e.currentTarget)}
              data-cursor="Expand"
              className="gallery-tile group break-inside-avoid overflow-hidden rounded-[2rem] border border-white/10 bg-white/[0.04] shadow-2xl shadow-black/40 backdrop-blur-xl text-left w-full block"
              aria-label={`Expand ${item.title}`}
            >
              <div className={`${index % 3 === 0 ? 'aspect-[4/5]' : index % 3 === 1 ? 'aspect-[5/4]' : 'aspect-square'} relative overflow-hidden bg-gradient-to-br from-violet-500/20 via-white/[0.03] to-blue-500/20`}>
                <img
                  src={item.image}
                  alt={item.title}
                  loading="lazy"
                  className="absolute inset-0 h-full w-full object-cover transition duration-700 ease-out group-hover:scale-110 group-hover:rotate-1"
                />
                <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-80 transition-opacity duration-500 group-hover:opacity-95" />
                <div className="absolute inset-x-0 top-0 h-24 bg-gradient-to-b from-black/55 to-transparent" />
                <div className="relative z-10 flex h-full flex-col justify-between p-6">
                  <p className="uppercase tracking-[0.3em] text-[10px] text-zinc-200/80">Archive {String(index + 1).padStart(2, '0')}</p>
                  <div>
                    <p className="mb-3 text-xs uppercase tracking-[0.24em] text-violet-100/80">{item.category}</p>
                    <h3 className="display-type text-2xl font-black leading-none text-white drop-shadow-2xl">{item.title}</h3>
                  </div>
                </div>
              </div>
            </Reveal>
          ))}
        </div>
      </div>

      {active && (
        <div className="fixed inset-0 z-[95] flex items-center justify-center p-6" role="dialog" aria-modal="true" aria-label={active.title}>
          <div className="absolute inset-0 bg-black/90 backdrop-blur-md" onClick={closeLightbox} />

          <button
            onClick={() => setActiveIndex((i) => (i - 1 + archiveItems.length) % archiveItems.length)}
            aria-label="Previous image"
            className="hidden md:flex absolute left-6 top-1/2 -translate-y-1/2 h-11 w-11 items-center justify-center rounded-full border border-white/15 text-zinc-300 hover:bg-white/10 hover:text-white"
          >‹</button>

          <div className="relative max-w-4xl w-full">
            <img src={active.image} alt={active.title} className="w-full max-h-[80vh] object-contain rounded-2xl border border-white/10" />
            <div className="mt-4 flex items-center justify-between">
              <div>
                <p className="uppercase tracking-[0.28em] text-[10px] text-zinc-400">{active.category}</p>
                <h3 className="display-type text-2xl font-black">{active.title}</h3>
              </div>
              <button onClick={closeLightbox} className="rounded-full border border-white/15 px-4 py-2 text-sm text-zinc-300 hover:bg-white/10">
                Close (Esc)
              </button>
            </div>
          </div>

          <button
            onClick={() => setActiveIndex((i) => (i + 1) % archiveItems.length)}
            aria-label="Next image"
            className="hidden md:flex absolute right-6 top-1/2 -translate-y-1/2 h-11 w-11 items-center justify-center rounded-full border border-white/15 text-zinc-300 hover:bg-white/10 hover:text-white"
          >›</button>
        </div>
      )}
    </section>
  );
}

/* Case-study outline modal. Every field is either real (a string you've written) or null.
   Null fields render as a dashed placeholder that says exactly what's missing — never
   invented text standing in for research, metrics, or results that don't exist yet. */
function CaseStudyModal({ project, onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  if (!project) return null;

  return (
    <div className="fixed inset-0 z-[95] flex items-start justify-center p-4 md:p-8 overflow-y-auto" role="dialog" aria-modal="true" aria-label={`${project.title} case study outline`}>
      <div className="absolute inset-0 bg-black/90 backdrop-blur-md" onClick={onClose} />
      <div className="relative w-full max-w-3xl rounded-[2rem] border border-white/10 bg-[#0f0f10] my-8">
        <div className="sticky top-0 z-10 flex items-center justify-between gap-4 border-b border-white/10 bg-[#0f0f10]/95 backdrop-blur-xl px-6 md:px-10 py-6 rounded-t-[2rem]">
          <div>
            <p className="uppercase tracking-[0.3em] text-[10px] text-zinc-400 mb-1">Case Study Outline</p>
            <h3 className="display-type text-2xl md:text-3xl font-black">{project.title}</h3>
          </div>
          <button onClick={onClose} className="shrink-0 rounded-full border border-white/15 px-4 py-2 text-sm text-zinc-300 hover:bg-white/10" autoFocus>
            Close (Esc)
          </button>
        </div>

        <div className="px-6 md:px-10 py-8 grid gap-6">
          <p className="text-xs text-zinc-400 leading-relaxed border border-dashed border-white/15 rounded-xl p-4">
            This outline is structural only. Fields below are empty until real project detail is added —
            nothing on this screen is invented.
          </p>
          {caseStudyFields.map((field) => (
            <div key={field.key} className="border-b border-white/5 pb-6 last:border-0">
              <p className="uppercase tracking-[0.25em] text-[10px] text-zinc-400 mb-2">{field.label}</p>
              {project.caseStudy[field.key] ? (
                <p className="text-zinc-200 leading-relaxed">{project.caseStudy[field.key]}</p>
              ) : (
                <p className="text-zinc-500 text-sm italic border border-dashed border-white/10 rounded-lg px-4 py-3">
                  Needs real {field.label.toLowerCase()} from Siddhi — not yet added.
                </p>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
